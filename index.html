<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CORAZON DE FOTOS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Poppins,system-ui}
body{
  min-height:100vh;
  background:#fafafa;
  padding:16px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* CARGA */
#loading-screen{
  position:fixed;inset:0;background:#fafafa;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:100;gap:16px;font-size:18px;color:#555;
}
#loading-screen.hidden{display:none}
.spinner{
  width:48px;height:48px;border:4px solid #eee;
  border-top-color:#111;border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* TE AMO */
.teamo{
  display:flex;justify-content:center;
  gap:clamp(12px,4vw,60px);margin-top:20px;
}
.word{display:flex;gap:clamp(6px,2vw,26px)}
.letter{
  font-size:clamp(52px,13vw,120px);font-weight:1000;line-height:1;
  color:#d0d0d0;background-color:#d0d0d0;
  background-size:cover;background-position:center;
  -webkit-background-clip:text;background-clip:text;
  transition:1s;
}
.letter.filled{color:transparent}

/* CORAZON */
.heart-wrapper{
  width:100%;max-width:900px;margin:16px auto 0;
  position:relative;aspect-ratio:1186/1112;
}

/* SLOT */
.photo-slot{
  position:absolute;
  background:#ebebeb;
  background-size:cover;
  background-position:center;
  cursor:pointer;
  transition:.2s;
  overflow:hidden;
}

/* Overlay: oculto por defecto, visible al tocar/hover */
.slot-overlay{
  position:absolute;inset:0;
  display:flex;align-items:flex-end;justify-content:flex-end;
  padding:4px;
  opacity:0;transition:.2s;
  pointer-events:none;
}
.photo-slot:hover .slot-overlay,
.photo-slot.active .slot-overlay{
  opacity:1;
  pointer-events:all;
}

/* Slot vacio: mostrar icono + pequeno en esquina siempre */
.photo-slot.empty::after{
  content:'+';
  position:absolute;
  bottom:3px;right:4px;
  font-size:clamp(10px,2.5vw,16px);
  color:#aaa;
  line-height:1;
  pointer-events:none;
}

.slot-btn{
  width:clamp(20px,5vw,30px);
  height:clamp(20px,5vw,30px);
  border:0;border-radius:50%;
  font-size:clamp(10px,2.5vw,14px);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:.15s;
  flex-shrink:0;
}
.slot-btn-add{background:rgba(255,255,255,.9);color:#111}
.slot-btn-add:active{background:#eee}
.slot-btn-del{background:#ff4d6d;color:#fff;margin-right:3px}
.slot-btn-del:active{background:#e63558}
.slot-input{display:none}

/* ESTADO */
#estado{
  margin-top:12px;font-size:12px;color:#888;text-align:center;min-height:18px;
}

/* MODAL */
#modal{
  position:fixed;inset:0;
  background:rgba(0,0,0,.88);
  z-index:200;
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;
  transition:.25s;
}
#modal.open{opacity:1;pointer-events:all}
#modal img{
  max-width:92vw;max-height:92vh;
  object-fit:contain;
  border-radius:8px;
  box-shadow:0 8px 40px rgba(0,0,0,.6);
  transform:scale(.95);
  transition:.25s;
}
#modal.open img{transform:scale(1)}

/* RESPONSIVE */
@media(max-width:600px){
  body{padding:8px}
  .heart-wrapper{margin-top:10px}
  .teamo{margin-top:14px}
}
</style>
</head>
<body>

<div id="loading-screen"><div class="spinner"></div><span>Conectando...</span></div>

<div class="teamo">
  <div class="word">
    <div class="letter" id="l0">T</div>
    <div class="letter" id="l1">E</div>
    <div class="letter" id="l2">&nbsp;</div>
  </div>
  <div class="word">
    <div class="letter" id="l3">A</div>
    <div class="letter" id="l4">M</div>
    <div class="letter" id="l5">O</div>
  </div>
</div>

<div class="heart-wrapper" id="heart"></div>
<div id="estado"></div>
<div id="modal"><img id="modal-img" src="" alt=""></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, deleteField, onSnapshot, updateDoc }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBEfBvgt8WtlMGjQXWG33-AyZwyltdlfdo",
  authDomain: "corazon-fotos.firebaseapp.com",
  projectId: "corazon-fotos",
  storageBucket: "corazon-fotos.firebasestorage.app",
  messagingSenderId: "207795515918",
  appId: "1:207795515918:web:dc1dc2e995db5f78ad025f"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// Un documento por slot: corazon/slot_0 .. slot_24
// Cada documento: { img: "data:image/jpeg;base64,..." } o no existe

const LAYOUT = [
  {left:'10.35%',top:'3.24%',width:'25.80%',height:'11.96%'},
  {left:'65.27%',top:'3.24%',width:'25.80%',height:'11.96%'},
  {left:'32.58%',top:'16.20%',width:'10.70%',height:'11.40%'},
  {left:'21.70%',top:'16.20%',width:'9.78%',height:'11.40%'},
  {left:'1.13%',top:'16.37%',width:'19.65%',height:'20.86%'},
  {left:'21.60%',top:'50.80%',width:'21.50%',height:'19.98%'},
  {left:'21.75%',top:'28.69%',width:'21.50%',height:'21.04%'},
  {left:'44.20%',top:'28.69%',width:'10.03%',height:'9.98%'},
  {left:'55.25%',top:'16.20%',width:'21.80%',height:'22.40%'},
  {left:'78.11%',top:'16.20%',width:'21.65%',height:'12.60%'},
  {left:'1%',top:'38.50%',width:'9.60%',height:'10.16%'},
  {left:'11.54%',top:'38.60%',width:'9.03%',height:'22.39%'},
  {left:'44.20%',top:'39.66%',width:'21.50%',height:'21.50%'},
  {left:'66.56%',top:'39.66%',width:'10.50%',height:'11.10%'},
  {left:'78.10%',top:'29.90%',width:'21.60%',height:'20.86%'},
  {left:'66.50%',top:'51.80%',width:'21.65%',height:'9.40%'},
  {left:'44.20%',top:'62.41%',width:'21.50%',height:'20.95%'},
  {left:'66.60%',top:'62.34%',width:'11.00%',height:'12.25%'},
  {left:'31.58%',top:'71.94%',width:'11.50%',height:'11.40%'},
  {left:'44.20%',top:'84.45%',width:'16.60%',height:'12.69%'},
];

// Slots 0-4 son las letras T E _ A M O
// Slots 5-24 son el corazon (20 slots)
const LETTER_IDS = ['l0','l1','l2','l3','l4']; // l2 es el espacio, sin foto

const estado = document.getElementById('estado');
const heart  = document.getElementById('heart');

// Estado local de imagenes
const images = new Array(25).fill(null);

/* ---- Compresion ---- */
async function compressFile(file, maxSize=800, quality=0.7){
  return new Promise(resolve=>{
    const img=new Image(), r=new FileReader();
    r.onload=()=>{
      img.onload=()=>{
        let {width:w,height:h}=img;
        if(w>h&&w>maxSize){h=Math.round(h*maxSize/w);w=maxSize;}
        else if(h>maxSize){w=Math.round(w*maxSize/h);h=maxSize;}
        const c=document.createElement('canvas');
        c.width=w;c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        c.toBlob(b=>resolve(b),'image/jpeg',quality);
      };
      img.src=r.result;
    };
    r.readAsDataURL(file);
  });
}

async function compressTo(file, limitKB=700){
  let q=0.7, blob=await compressFile(file,800,q);
  while(blob.size>limitKB*1024&&q>0.2){q-=0.1;blob=await compressFile(file,800,q);}
  return blob;
}

function blobToBase64(blob){
  return new Promise(r=>{const fr=new FileReader();fr.onload=()=>r(fr.result);fr.readAsDataURL(blob);});
}

/* ---- Subir foto a un slot ---- */
async function subirFoto(index, file){
  estado.textContent='Comprimiendo...';
  try{
    const blob = await compressTo(file);
    const b64  = await blobToBase64(blob);
    estado.textContent='Guardando...';
    await setDoc(doc(db,'corazon',`slot_${index}`),{img:b64, updatedAt:Date.now()});
    estado.textContent='';
  }catch(e){
    estado.textContent='Error: '+e.message;
    console.error(e);
  }
}

/* ---- Eliminar foto de un slot ---- */
async function eliminarFoto(index){
  estado.textContent='Eliminando...';
  try{
    await setDoc(doc(db,'corazon',`slot_${index}`),{img:null, updatedAt:Date.now()});
    estado.textContent='';
  }catch(e){
    estado.textContent='Error: '+e.message;
  }
}

/* ---- Aplicar imagen a letra ---- */
function applyLetter(index, imgUrl){
  // index 0=T 1=E 2=espacio 3=A 4=M  -> letter ids l0..l4
  // index 5 no es letra
  if(index>=5) return;
  if(index===2) return; // espacio, sin foto
  const el = document.getElementById(LETTER_IDS[index]);
  if(!el) return;
  if(imgUrl){
    el.style.backgroundImage=`url('${imgUrl}')`;
    el.classList.add('filled');
  } else {
    el.style.backgroundImage='';
    el.classList.remove('filled');
  }
}

/* ---- Aplicar imagen a slot del corazon ---- */
function applySlot(index, imgUrl){
  const slotEl = document.getElementById(`slot_${index}`);
  if(!slotEl) return;
  const delBtn = slotEl.querySelector('.slot-btn-del');
  if(imgUrl){
    slotEl.style.backgroundImage=`url('${imgUrl}')`;
    slotEl.classList.remove('empty');
    if(delBtn) delBtn.style.display='flex';
  } else {
    slotEl.style.backgroundImage='';
    slotEl.classList.add('empty');
    if(delBtn) delBtn.style.display='none';
  }
}

/* ---- Modal ---- */
const modal    = document.getElementById('modal');
const modalImg = document.getElementById('modal-img');

function openModal(src){
  modalImg.src=src;
  modal.classList.add('open');
}
function closeModal(){
  modal.classList.remove('open');
  setTimeout(()=>{ modalImg.src=''; },250);
}
modal.addEventListener('click', closeModal);

/* ---- Toggle overlay en movil al tocar ---- */
let activeSlot = null;
document.addEventListener('click', e=>{
  if(!e.target.closest('.photo-slot') && !e.target.closest('#modal')){
    closeActiveSlot();
  }
});

/* ---- Construir los slots del corazon en el DOM ---- */
function buildHeart(){
  heart.innerHTML='';
  for(let i=5;i<25;i++){
    const l = LAYOUT[i-5];
    const div = document.createElement('div');
    div.className='photo-slot empty';
    div.id=`slot_${i}`;
    div.style.cssText=`left:${l.left};top:${l.top};width:${l.width};height:${l.height}`;

    // Input oculto
    const inp = document.createElement('input');
    inp.type='file';inp.accept='image/*';inp.className='slot-input';
    inp.id=`input_${i}`;

    // Overlay (esquina inferior derecha)
    const overlay = document.createElement('div');
    overlay.className='slot-overlay';

    // Boton eliminar
    const delBtn = document.createElement('button');
    delBtn.className='slot-btn slot-btn-del';
    delBtn.title='Eliminar';
    delBtn.innerHTML='&#10005;';
    delBtn.style.display='none';
    delBtn.onclick=(e)=>{e.stopPropagation();eliminarFoto(i);};

    // Boton agregar/reemplazar
    const addBtn = document.createElement('button');
    addBtn.className='slot-btn slot-btn-add';
    addBtn.title='Foto';
    addBtn.innerHTML='&#43;';
    addBtn.onclick=(e)=>{e.stopPropagation();inp.click();};

    inp.onchange=()=>{if(inp.files[0]) subirFoto(i,inp.files[0]);inp.value='';};

    div.addEventListener('click', e=>{
      if(e.target===addBtn||e.target===delBtn) return;

      const hasImg = !div.classList.contains('empty');

      // Si ya estaba activo y tiene foto: abrir modal
      if(div.classList.contains('active') && hasImg){
        const src = images[i];
        if(src){ closeActiveSlot(); openModal(src); return; }
      }

      // Si no estaba activo: activar overlay
      closeActiveSlot();
      div.classList.add('active');
      activeSlot = div;
    });

    overlay.appendChild(delBtn);
    overlay.appendChild(addBtn);
    div.appendChild(inp);
    div.appendChild(overlay);
    heart.appendChild(div);
  }
}

function closeActiveSlot(){
  if(activeSlot){ activeSlot.classList.remove('active'); activeSlot=null; }
}

/* ---- Escuchar cada slot en tiempo real ---- */
function listenSlot(index){
  onSnapshot(doc(db,'corazon',`slot_${index}`), snap=>{
    const imgUrl = snap.exists()&&snap.data().img ? snap.data().img : null;
    images[index]=imgUrl;
    if(index<5){
      applyLetter(index,imgUrl);
    } else {
      applySlot(index,imgUrl);
    }
  });
}

/* ---- Init ---- */
function init(){
  buildHeart();
  // Escuchar los 25 slots (0-4 letras, 5-24 corazon)
  for(let i=0;i<25;i++) listenSlot(i);
  document.getElementById('loading-screen').classList.add('hidden');
}

init();
</script>
</body>
</html>
