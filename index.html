<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CORAZON DE FOTOS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Poppins,system-ui}
body{
  min-height:100vh;
  background:#0e1128;
  padding:16px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow-x:hidden;
}

/* FONDO CANVAS */
#bg-canvas{
  position:fixed;inset:0;z-index:0;pointer-events:none;
}

/* Todo el contenido sobre el canvas */
.teamo, .heart-wrapper, #estado{position:relative;z-index:1;}

/* CARGA */
#loading-screen{
  position:fixed;inset:0;background:#0e1128;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:100;gap:16px;font-size:18px;color:#9aa0cc;
}
#loading-screen.hidden{display:none}
.spinner{
  width:48px;height:48px;border:4px solid #2a2a3a;
  border-top-color:#ff4d6d;border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* TE AMO */
.teamo{
  display:flex;justify-content:center;
  gap:clamp(12px,4vw,60px);margin-top:20px;
}
.word{display:flex;gap:clamp(6px,2vw,26px)}
.letter{
  font-size:clamp(52px,13vw,120px);font-weight:700;line-height:1;
  font-family:'Dancing Script',cursive;
  color:#927bd1;background-color:#927bd1;
  background-size:cover;background-position:center;
  -webkit-background-clip:text;background-clip:text;
  transition:1s;
}
.letter.filled{
  color:transparent;
  filter:drop-shadow(0 0 12px rgba(255,150,180,.6)) drop-shadow(0 0 24px rgba(255,180,210,.3));
}

/* CORAZON */
.heart-wrapper{
  width:100%;max-width:900px;margin:16px auto 0;
  position:relative;aspect-ratio:1186/1112;
}

/* SLOT */
.photo-slot{
  position:absolute;
  background:#2e3460;
  background-size:cover;
  background-position:center;
  cursor:pointer;
  transition:.2s;
  overflow:hidden;
  border:1px solid rgba(140,160,255,.3);
}
.photo-slot:not(.empty){
  filter:drop-shadow(0 0 4px rgba(255,77,109,.3));
}

/* Overlay hover */
.slot-overlay{
  position:absolute;inset:0;
  background:rgba(0,0,0,.3);
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:.2s;
  pointer-events:none;
  font-size:clamp(14px,3vw,22px);
  color:rgba(255,255,255,.9);
}
.photo-slot:not(.empty):hover .slot-overlay{opacity:1}

/* Slot vacio */
.photo-slot.empty::after{
  content:'+';
  position:absolute;
  bottom:3px;right:4px;
  font-size:clamp(10px,2.5vw,16px);
  color:rgba(255,77,109,.4);
  line-height:1;
  pointer-events:none;
}

.slot-input{display:none}

#estado{
  margin-top:12px;font-size:12px;color:#666;text-align:center;min-height:18px;
}

/* MODAL */
#modal{
  position:fixed;inset:0;
  background:rgba(0,0,0,.92);
  z-index:200;
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;
  transition:.25s;
}
#modal.open{opacity:1;pointer-events:all}
#modal-inner{
  display:flex;flex-direction:column;align-items:center;gap:14px;
}
#modal img{
  max-width:92vw;max-height:78vh;
  object-fit:contain;
  border-radius:8px;
  box-shadow:0 8px 40px rgba(255,77,109,.3);
  transform:scale(.95);
  transition:.25s;
}
#modal.open img{transform:scale(1)}
#modal-btns{display:flex;gap:12px}
#modal-btns button{
  padding:10px 22px;border:0;border-radius:10px;
  font-size:14px;font-weight:700;cursor:pointer;
}
#modal-btn-rep{background:#fff;color:#111}
#modal-btn-del{background:#ff4d6d;color:#fff}

/* RESPONSIVE */
@media(max-width:600px){
  body{padding:8px}
  .heart-wrapper{margin-top:10px}
  .teamo{margin-top:14px}
}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div id="loading-screen"><div class="spinner"></div><span>Conectando...</span></div>

<div class="teamo">
  <div class="word">
    <div class="letter" id="l0">T</div>
    <div class="letter" id="l1">E</div>
    <div class="letter" id="l2">&nbsp;</div>
  </div>
  <div class="word">
    <div class="letter" id="l3">A</div>
    <div class="letter" id="l4">M</div>
    <div class="letter" id="l5">O</div>
  </div>
</div>

<div class="heart-wrapper" id="heart"></div>
<div id="estado"></div>
<div id="modal">
  <div id="modal-inner">
    <img id="modal-img" src="" alt="">
    <div id="modal-btns">
      <input type="file" id="modal-input" accept="image/*" style="display:none">
      <button id="modal-btn-rep">Reemplazar</button>
      <button id="modal-btn-del">Eliminar</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, deleteField, onSnapshot, updateDoc }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBEfBvgt8WtlMGjQXWG33-AyZwyltdlfdo",
  authDomain: "corazon-fotos.firebaseapp.com",
  projectId: "corazon-fotos",
  storageBucket: "corazon-fotos.firebasestorage.app",
  messagingSenderId: "207795515918",
  appId: "1:207795515918:web:dc1dc2e995db5f78ad025f"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// Un documento por slot: corazon/slot_0 .. slot_24
// Cada documento: { img: "data:image/jpeg;base64,..." } o no existe

const LAYOUT = [
  {left:'10.35%',top:'3.24%',width:'25.80%',height:'11.96%'},
  {left:'65.27%',top:'3.24%',width:'25.80%',height:'11.96%'},
  {left:'32.58%',top:'16.20%',width:'10.70%',height:'11.40%'},
  {left:'21.70%',top:'16.20%',width:'9.78%',height:'11.40%'},
  {left:'1.13%',top:'16.37%',width:'19.65%',height:'20.86%'},
  {left:'21.60%',top:'50.80%',width:'21.50%',height:'19.98%'},
  {left:'21.75%',top:'28.69%',width:'21.50%',height:'21.04%'},
  {left:'44.20%',top:'28.69%',width:'10.03%',height:'9.98%'},
  {left:'55.25%',top:'16.20%',width:'21.80%',height:'22.40%'},
  {left:'78.11%',top:'16.20%',width:'21.65%',height:'12.60%'},
  {left:'1%',top:'38.50%',width:'9.60%',height:'10.16%'},
  {left:'11.54%',top:'38.60%',width:'9.03%',height:'22.39%'},
  {left:'44.20%',top:'39.66%',width:'21.50%',height:'21.50%'},
  {left:'66.56%',top:'39.66%',width:'10.50%',height:'11.10%'},
  {left:'78.10%',top:'29.90%',width:'21.60%',height:'20.86%'},
  {left:'66.50%',top:'51.80%',width:'21.65%',height:'9.40%'},
  {left:'44.20%',top:'62.41%',width:'21.50%',height:'20.95%'},
  {left:'66.60%',top:'62.34%',width:'11.00%',height:'12.25%'},
  {left:'31.58%',top:'71.94%',width:'11.50%',height:'11.40%'},
  {left:'44.20%',top:'84.45%',width:'16.60%',height:'12.69%'},
];

// Slots 0-4 son las letras T E _ A M O
// Slots 5-24 son el corazon (20 slots)
const LETTER_IDS = ['l0','l1','l2','l3','l4']; // l2 es el espacio, sin foto

const estado = document.getElementById('estado');
const heart  = document.getElementById('heart');

// Estado local de imagenes
const images = new Array(25).fill(null);

/* ---- Compresion ---- */
async function compressFile(file, maxSize=1600, quality=0.88){
  return new Promise(resolve=>{
    const img=new Image(), r=new FileReader();
    r.onload=()=>{
      img.onload=()=>{
        let {width:w,height:h}=img;
        if(w>h&&w>maxSize){h=Math.round(h*maxSize/w);w=maxSize;}
        else if(h>maxSize){w=Math.round(w*maxSize/h);h=maxSize;}
        const c=document.createElement('canvas');
        c.width=w;c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        c.toBlob(b=>resolve(b),'image/jpeg',quality);
      };
      img.src=r.result;
    };
    r.readAsDataURL(file);
  });
}

async function compressTo(file, limitKB=680){
  let q=0.88, blob=await compressFile(file,1600,q);
  while(blob.size>limitKB*1024&&q>0.2){q-=0.1;blob=await compressFile(file,1600,q);}
  return blob;
}

function blobToBase64(blob){
  return new Promise(r=>{const fr=new FileReader();fr.onload=()=>r(fr.result);fr.readAsDataURL(blob);});
}

/* ---- Subir foto a un slot ---- */
async function subirFoto(index, file){
  estado.textContent='Comprimiendo...';
  try{
    const blob = await compressTo(file);
    const b64  = await blobToBase64(blob);
    estado.textContent='Guardando...';
    await setDoc(doc(db,'corazon',`slot_${index}`),{img:b64, updatedAt:Date.now()});
    estado.textContent='';
  }catch(e){
    estado.textContent='Error: '+e.message;
    console.error(e);
  }
}

/* ---- Eliminar foto de un slot ---- */
async function eliminarFoto(index){
  estado.textContent='Eliminando...';
  try{
    await setDoc(doc(db,'corazon',`slot_${index}`),{img:null, updatedAt:Date.now()});
    estado.textContent='';
  }catch(e){
    estado.textContent='Error: '+e.message;
  }
}

/* ---- Aplicar imagen a letra ---- */
function applyLetter(index, imgUrl){
  // index 0=T 1=E 2=espacio 3=A 4=M  -> letter ids l0..l4
  // index 5 no es letra
  if(index>=5) return;
  if(index===2) return; // espacio, sin foto
  const el = document.getElementById(LETTER_IDS[index]);
  if(!el) return;
  if(imgUrl){
    el.style.backgroundImage=`url('${imgUrl}')`;
    el.classList.add('filled');
  } else {
    el.style.backgroundImage='';
    el.classList.remove('filled');
  }
}

/* ---- Aplicar imagen a slot del corazon ---- */
function applySlot(index, imgUrl){
  const slotEl = document.getElementById(`slot_${index}`);
  if(!slotEl) return;
  const delBtn = slotEl.querySelector('.slot-btn-del');
  if(imgUrl){
    slotEl.style.backgroundImage=`url('${imgUrl}')`;
    slotEl.classList.remove('empty');
    if(delBtn) delBtn.style.display='flex';
  } else {
    slotEl.style.backgroundImage='';
    slotEl.classList.add('empty');
    if(delBtn) delBtn.style.display='none';
  }
}

/* ---- Modal ---- */
const modal      = document.getElementById('modal');
const modalImg   = document.getElementById('modal-img');
const modalInput = document.getElementById('modal-input');
const modalBtnRep= document.getElementById('modal-btn-rep');
const modalBtnDel= document.getElementById('modal-btn-del');
let modalIndex   = null;

function openModal(index){
  modalIndex = index;
  modalImg.src = images[index];
  modal.classList.add('open');
}
function closeModal(){
  modal.classList.remove('open');
  setTimeout(()=>{ modalImg.src=''; modalIndex=null; },250);
}

modal.addEventListener('click', e=>{
  if(e.target===modal) closeModal();
});
modalBtnRep.onclick=()=>{ modalInput.click(); };
modalBtnDel.onclick=()=>{
  if(modalIndex!==null){ eliminarFoto(modalIndex); closeModal(); }
};
modalInput.onchange=()=>{
  if(modalInput.files[0]&&modalIndex!==null){
    subirFoto(modalIndex, modalInput.files[0]);
    closeModal();
    modalInput.value='';
  }
};



/* ---- Construir los slots del corazon en el DOM ---- */
function buildHeart(){
  heart.innerHTML='';
  for(let i=5;i<25;i++){
    const l = LAYOUT[i-5];
    const div = document.createElement('div');
    div.className='photo-slot empty';
    div.id=`slot_${i}`;
    div.style.cssText=`left:${l.left};top:${l.top};width:${l.width};height:${l.height}`;

    const inp = document.createElement('input');
    inp.type='file';inp.accept='image/*';inp.className='slot-input';
    inp.id=`input_${i}`;
    inp.onchange=()=>{if(inp.files[0]) subirFoto(i,inp.files[0]);inp.value='';};

    const overlay = document.createElement('div');
    overlay.className='slot-overlay';
    overlay.textContent='⤢';

    div.addEventListener('click', ()=>{
      if(div.classList.contains('empty')){
        inp.click();
      } else {
        openModal(i);
      }
    });

    div.appendChild(inp);
    div.appendChild(overlay);
    heart.appendChild(div);
  }
}

/* ---- Escuchar cada slot en tiempo real ---- */
function listenSlot(index){
  onSnapshot(doc(db,'corazon',`slot_${index}`), snap=>{
    const imgUrl = snap.exists()&&snap.data().img ? snap.data().img : null;
    images[index]=imgUrl;
    if(index<5){
      applyLetter(index,imgUrl);
    } else {
      applySlot(index,imgUrl);
    }
  });
}

/* ---- Init ---- */
function init(){
  buildHeart();
  for(let i=0;i<25;i++) listenSlot(i);
  document.getElementById('loading-screen').classList.add('hidden');
  initBg();
}

/* ---- Fondo: nebulosa + corazones flotantes ---- */
function initBg(){
  const canvas = document.getElementById('bg-canvas');
  const ctx    = canvas.getContext('2d');
  let W, H;

  function resize(){
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  // Orbes de nebulosa
  const orbs = [
    {hue:230, sat:70},  // azul medio
    {hue:260, sat:65},  // lavanda
    {hue:210, sat:70},  // azul cielo
    {hue:280, sat:60},  // violeta suave
    {hue:200, sat:65},  // azul pastel
    {hue:245, sat:60},  // indigo suave
  ].map(o=>({
    ...o,
    x: Math.random()*W,
    y: Math.random()*H,
    r: 180 + Math.random()*280,
    speed: 0.12 + Math.random()*0.18,
    angle: Math.random()*Math.PI*2,
  }));

  // Corazones flotantes
  function heartPath(ctx, x, y, size){
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(size, size);
    ctx.beginPath();
    ctx.moveTo(0, -0.35);
    ctx.bezierCurveTo( 0.5,-1,  1.2, 0.1,  0,  0.9);
    ctx.bezierCurveTo(-1.2, 0.1, -0.5,-1,  0, -0.35);
    ctx.restore();
  }

  const particles = Array.from({length:40}, ()=>({
    x: Math.random()*W,
    y: Math.random()*H + H,
    size: 4 + Math.random()*12,
    speed: 0.4 + Math.random()*0.8,
    drift: (Math.random()-.5)*0.5,
    opacity: 0.15 + Math.random()*0.3,
    hue: [220,240,260,280,320][Math.floor(Math.random()*5)],
    rot: Math.random()*Math.PI*2,
    rotSpeed: (Math.random()-.5)*0.025,
  }));

  let t = 0;
  (function loop(){
    t += 0.004;
    ctx.clearRect(0,0,W,H);

    // Orbes nebulosa
    orbs.forEach(o=>{
      o.angle += o.speed * 0.01;
      o.x += Math.cos(o.angle) * 0.4;
      o.y += Math.sin(o.angle) * 0.3;
      if(o.x < -o.r) o.x = W + o.r;
      if(o.x > W+o.r) o.x = -o.r;
      if(o.y < -o.r) o.y = H + o.r;
      if(o.y > H+o.r) o.y = -o.r;
      const g = ctx.createRadialGradient(o.x,o.y,0,o.x,o.y,o.r);
      g.addColorStop(0,   `hsla(${o.hue},${o.sat}%,85%,0.38)`);
      g.addColorStop(0.3, `hsla(${o.hue},${o.sat}%,75%,0.18)`);
      g.addColorStop(0.7, `hsla(${o.hue},${o.sat}%,65%,0.07)`);
      g.addColorStop(1,   `hsla(${o.hue},${o.sat}%,70%,0)`);
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(o.x,o.y,o.r,0,Math.PI*2);
      ctx.fill();
      // destello central
      const gCore = ctx.createRadialGradient(o.x,o.y,0,o.x,o.y,o.r*0.18);
      gCore.addColorStop(0, `hsla(${o.hue},100%,95%,0.22)`);
      gCore.addColorStop(1, `hsla(${o.hue},100%,95%,0)`);
      ctx.fillStyle = gCore;
      ctx.beginPath();
      ctx.arc(o.x,o.y,o.r*0.18,0,Math.PI*2);
      ctx.fill();
    });

    // Corazones flotantes
    particles.forEach(p=>{
      p.y -= p.speed;
      p.x += p.drift;
      p.rot += p.rotSpeed;
      if(p.y < -20){ p.y=H+20; p.x=Math.random()*W; }
      const color = `hsl(${p.hue + Math.sin(t+p.x)*15},90%,78%)`;
      // halo exterior
      ctx.save();
      ctx.globalAlpha = p.opacity * 0.35;
      ctx.shadowColor = color;
      ctx.shadowBlur  = 14;
      ctx.fillStyle   = color;
      heartPath(ctx, p.x, p.y, p.size * 1.35);
      ctx.fill();
      ctx.restore();
      // corazon principal
      ctx.save();
      ctx.globalAlpha = p.opacity;
      ctx.shadowColor = color;
      ctx.shadowBlur  = 8;
      ctx.fillStyle   = color;
      heartPath(ctx, p.x, p.y, p.size);
      ctx.fill();
      ctx.restore();
    });

    requestAnimationFrame(loop);
  })();
}

init();
</script>
</body>
</html>
