<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CORAZON DE FOTOS</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Poppins,system-ui}
body{
  min-height:100vh;
  background:#fafafa;
  padding:16px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* PANTALLA DE CARGA */
#loading-screen{
  position:fixed;inset:0;background:#fafafa;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:100;gap:16px;font-size:18px;color:#555;
}
#loading-screen.hidden{display:none}
.spinner{
  width:48px;height:48px;border:4px solid #eee;
  border-top-color:#111;border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* SELECTOR DE MODO */
#mode-selector{
  width:100%;max-width:500px;margin-top:80px;
  display:flex;flex-direction:column;align-items:center;gap:20px;
}
#mode-selector h1{font-size:28px;font-weight:800;text-align:center}
#mode-selector p{color:#666;text-align:center;font-size:15px}
.mode-btns{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;width:100%}
.btn-mode{
  flex:1 1 200px;padding:18px;border:0;border-radius:14px;
  font-size:16px;font-weight:800;cursor:pointer;transition:.2s;
}
.btn-modo-ella{background:#ff4d6d;color:#fff}
.btn-modo-ella:hover{background:#e63558}
.btn-modo-yo{background:#111;color:#fff}
.btn-modo-yo:hover{background:#000}

/* SUBIDA */
#vista-subida{display:none;width:100%;flex-direction:column;align-items:center}
#vista-subida.active{display:flex}
.agregar{
  width:100%;max-width:900px;display:flex;gap:12px;
  flex-wrap:wrap;justify-content:center;margin-bottom:5%;margin-top:60px;
}
.crear{width:60%;max-width:900px;display:flex;justify-content:center;margin:30px 0 16px}
.btn{flex:1 1 220px;padding:14px 18px;border:0;border-radius:14px;font-size:15px;font-weight:800;cursor:pointer;transition:.25s}
.btn-upload{position:relative;background:#fff;border:2px dashed #ccc;color:#333;overflow:hidden}
.btn-upload input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
.btn-upload:hover{background:#f1f1f1}
.btn-create{background:#111;color:#fff}
.btn-create:hover{background:#000}
.btn-create:disabled{background:#999;cursor:not-allowed}
input[type=file]{display:none}

#progreso{width:100%;max-width:900px;margin:12px 0;font-size:14px;color:#555;text-align:center;min-height:22px}
.barra-wrap{width:100%;max-width:900px;height:8px;background:#eee;border-radius:8px;overflow:hidden;margin-bottom:8px;display:none}
.barra-fill{height:100%;width:0%;background:#111;transition:.3s}

/* TE AMO preview */
.teamo{display:flex;justify-content:center;gap:clamp(24px,6vw,60px);margin-top:10px}
.word{display:flex;gap:clamp(10px,3vw,26px)}
.letter{
  font-size:clamp(86px,18vw,120px);font-weight:1000;line-height:1;
  color:#d0d0d0;background-color:#d0d0d0;
  background-size:cover;background-position:center;
  -webkit-background-clip:text;background-clip:text;
}
.letter.filled{color:transparent}

/* CORAZON preview */
.heart-wrapper{width:100%;max-width:900px;margin:32px auto 0;position:relative;aspect-ratio:1186/1112}
.photo-slot{position:absolute;background:#e0e0e0;background-size:cover;background-position:center}

/* VISTA YO - espera */
#vista-yo{display:none;width:100%;flex-direction:column;align-items:center}
#vista-yo.active{display:flex}
#estado-espera{margin-top:100px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:20px}
#estado-espera h2{font-size:24px;font-weight:800}
#estado-espera p{color:#666;font-size:15px}
.pulso{width:60px;height:60px;background:#ff4d6d;border-radius:50%;animation:pulso 1.5s ease-in-out infinite}
@keyframes pulso{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.2);opacity:.7}}

/* RESULTADO */
#vista-resultado{
  display:none;width:100%;min-height:100vh;background:#f7f8fc;
  flex-direction:column;align-items:center;justify-content:center;
  padding:16px;position:relative;overflow:hidden;
}
#vista-resultado.active{display:flex}
#vista-resultado::before{
  content:"";position:absolute;inset:-30%;
  background:
    radial-gradient(circle at 30% 20%,rgba(255,254,254,1),transparent 55%),
    radial-gradient(circle at 70% 80%,rgba(255,100,150,.4),transparent 55%),
    linear-gradient(180deg,#fff,#ffb3c6 70%);
  background-size:200% 200%;
  animation:skyDrift 30s ease-in-out infinite;z-index:0;
}
@keyframes skyDrift{
  0%{transform:translate(0,0) scale(1);filter:hue-rotate(0deg)}
  50%{transform:translate(-6%,-4%) scale(1.04);filter:hue-rotate(10deg)}
  100%{transform:translate(0,0) scale(1);filter:hue-rotate(-8deg)}
}
canvas#fireworks{position:fixed;inset:0;z-index:1;pointer-events:none}
.page-resultado{
  width:100%;max-width:900px;display:flex;flex-direction:column;align-items:center;
  position:relative;z-index:2;animation:floatSoft 2s ease-in-out infinite;
}
@keyframes floatSoft{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

.res-letter,.res-slot{opacity:0;transform:scale(.95);transition:1.2s}
.res-letter.show,.res-slot.show{opacity:1;transform:scale(1)}
.res-teamo{display:flex;justify-content:center;gap:clamp(24px,6vw,60px)}
.res-word{display:flex;gap:clamp(10px,3vw,26px)}
.res-letter{
  font-size:clamp(86px,18vw,120px);font-weight:1000;line-height:1;
  color:transparent;-webkit-background-clip:text;background-clip:text;
  background-size:cover;background-position:center;
  filter:drop-shadow(0 0 6px rgba(255,50,80,.8));
}
.res-heart{width:100%;max-width:900px;margin-top:28px;position:relative;aspect-ratio:1186/1112}
.res-slot{
  position:absolute;background-size:cover;background-position:center;
  filter:drop-shadow(0 0 6px rgba(255,1,1,.8));
}

@media(max-width:600px){body{padding:12px}.heart-wrapper{margin-top:24px}}
</style>
</head>
<body>

<div id="loading-screen"><div class="spinner"></div><span>Conectando...</span></div>

<div id="mode-selector" style="display:none">
  <h1>Corazon de Fotos</h1>
  <p>Quien eres?</p>
  <div class="mode-btns">
    <button class="btn-mode btn-modo-ella" id="btn-ella">Soy ella (subir fotos)</button>
    <button class="btn-mode btn-modo-yo" id="btn-yo">Soy yo (ver el resultado)</button>
  </div>
</div>

<div id="vista-subida">
  <div class="agregar">
    <label class="btn btn-upload">
      Agregar 25 fotos
      <input type="file" id="photos" accept="image/*" multiple>
    </label>
  </div>
  <div class="teamo">
    <div class="word">
      <div class="letter">T</div>
      <div class="letter">E</div>
      <div class="letter"></div>
    </div>
    <div class="word">
      <div class="letter">A</div>
      <div class="letter">M</div>
      <div class="letter">O</div>
    </div>
  </div>
  <div class="heart-wrapper">
    <div class="photo-slot" style="left:10.35%;top:3.24%;width:25.80%;height:11.96%"></div>
    <div class="photo-slot" style="left:65.27%;top:3.24%;width:25.80%;height:11.96%"></div>
    <div class="photo-slot" style="left:32.58%;top:16.20%;width:10.70%;height:11.40%"></div>
    <div class="photo-slot" style="left:21.70%;top:16.20%;width:9.78%;height:11.40%"></div>
    <div class="photo-slot" style="left:1.13%;top:16.37%;width:19.65%;height:20.86%"></div>
    <div class="photo-slot" style="left:21.60%;top:50.80%;width:21.50%;height:19.98%"></div>
    <div class="photo-slot" style="left:21.75%;top:28.69%;width:21.50%;height:21.04%"></div>
    <div class="photo-slot" style="left:44.20%;top:28.69%;width:10.03%;height:9.98%"></div>
    <div class="photo-slot" style="left:55.25%;top:16.20%;width:21.80%;height:22.40%"></div>
    <div class="photo-slot" style="left:78.11%;top:16.20%;width:21.65%;height:12.60%"></div>
    <div class="photo-slot" style="left:1%;top:38.50%;width:9.60%;height:10.16%"></div>
    <div class="photo-slot" style="left:11.54%;top:38.60%;width:9.03%;height:22.39%"></div>
    <div class="photo-slot" style="left:44.20%;top:39.66%;width:21.50%;height:21.50%"></div>
    <div class="photo-slot" style="left:66.56%;top:39.66%;width:10.50%;height:11.10%"></div>
    <div class="photo-slot" style="left:78.10%;top:29.90%;width:21.60%;height:20.86%"></div>
    <div class="photo-slot" style="left:66.50%;top:51.80%;width:21.65%;height:9.40%"></div>
    <div class="photo-slot" style="left:44.20%;top:62.41%;width:21.50%;height:20.95%"></div>
    <div class="photo-slot" style="left:66.60%;top:62.34%;width:11.00%;height:12.25%"></div>
    <div class="photo-slot" style="left:31.58%;top:71.94%;width:11.50%;height:11.40%"></div>
    <div class="photo-slot" style="left:44.20%;top:84.45%;width:16.60%;height:12.69%"></div>
  </div>
  <div id="progreso"></div>
  <div class="barra-wrap" id="barra-wrap"><div class="barra-fill" id="barra-fill"></div></div>
  <div class="crear">
    <button class="btn btn-create" id="create" disabled>Enviar fotos</button>
  </div>
</div>

<div id="vista-yo">
  <div id="estado-espera">
    <div class="pulso"></div>
    <h2>Esperando a que ella suba las fotos...</h2>
    <p>Esta pagina se actualizara sola cuando esten listas.</p>
  </div>
</div>

<div id="vista-resultado">
  <canvas id="fireworks"></canvas>
  <div class="page-resultado">
    <div class="res-teamo">
      <div class="res-word">
        <div class="res-letter">T</div>
        <div class="res-letter">E</div>
        <div class="res-letter"> </div>
      </div>
      <div class="res-word">
        <div class="res-letter">A</div>
        <div class="res-letter">M</div>
        <div class="res-letter">O</div>
      </div>
    </div>
    <div class="res-heart" id="res-heart"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot, getDoc }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBEfBvgt8WtlMGjQXWG33-AyZwyltdlfdo",
  authDomain: "corazon-fotos.firebaseapp.com",
  projectId: "corazon-fotos",
  storageBucket: "corazon-fotos.firebasestorage.app",
  messagingSenderId: "207795515918",
  appId: "1:207795515918:web:dc1dc2e995db5f78ad025f"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);
const META_DOC = doc(db,'corazon','sesion');

const LAYOUT = [
  {left:'10.35%',top:'3.24%',width:'25.80%',height:'11.96%'},
  {left:'65.27%',top:'3.24%',width:'25.80%',height:'11.96%'},
  {left:'32.58%',top:'16.20%',width:'10.70%',height:'11.40%'},
  {left:'21.70%',top:'16.20%',width:'9.78%',height:'11.40%'},
  {left:'1.13%',top:'16.37%',width:'19.65%',height:'20.86%'},
  {left:'21.60%',top:'50.80%',width:'21.50%',height:'19.98%'},
  {left:'21.75%',top:'28.69%',width:'21.50%',height:'21.04%'},
  {left:'44.20%',top:'28.69%',width:'10.03%',height:'9.98%'},
  {left:'55.25%',top:'16.20%',width:'21.80%',height:'22.40%'},
  {left:'78.11%',top:'16.20%',width:'21.65%',height:'12.60%'},
  {left:'1%',top:'38.50%',width:'9.60%',height:'10.16%'},
  {left:'11.54%',top:'38.60%',width:'9.03%',height:'22.39%'},
  {left:'44.20%',top:'39.66%',width:'21.50%',height:'21.50%'},
  {left:'66.56%',top:'39.66%',width:'10.50%',height:'11.10%'},
  {left:'78.10%',top:'29.90%',width:'21.60%',height:'20.86%'},
  {left:'66.50%',top:'51.80%',width:'21.65%',height:'9.40%'},
  {left:'44.20%',top:'62.41%',width:'21.50%',height:'20.95%'},
  {left:'66.60%',top:'62.34%',width:'11.00%',height:'12.25%'},
  {left:'31.58%',top:'71.94%',width:'11.50%',height:'11.40%'},
  {left:'44.20%',top:'84.45%',width:'16.60%',height:'12.69%'},
];

const $ = id => document.getElementById(id);
const loadingScreen = $('loading-screen');
const modeSelector  = $('mode-selector');
const vistaSubida   = $('vista-subida');
const vistaYo       = $('vista-yo');
const vistaRes      = $('vista-resultado');
const input         = $('photos');
const btnCreate     = $('create');
const progreso      = $('progreso');
const barraWrap     = $('barra-wrap');
const barraFill     = $('barra-fill');
const letters       = [...document.querySelectorAll('#vista-subida .letter')];
const slots         = [...document.querySelectorAll('#vista-subida .photo-slot')];
const TOTAL         = 25;
const CHUNK_SIZE    = 5;

async function compressImage(file, maxSize=800, quality=0.65){
  return new Promise(resolve=>{
    const img=new Image(), r=new FileReader();
    r.onload=()=>{
      img.onload=()=>{
        let {width:w,height:h}=img;
        if(w>h && w>maxSize){h=Math.round(h*maxSize/w);w=maxSize;}
        else if(h>maxSize){w=Math.round(w*maxSize/h);h=maxSize;}
        const c=document.createElement('canvas');
        c.width=w;c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        c.toBlob(b=>resolve(b),'image/jpeg',quality);
      };
      img.src=r.result;
    };
    r.readAsDataURL(file);
  });
}

async function compressTo(file,limitKB=900){
  let q=0.65;
  let blob=await compressImage(file,800,q);
  while(blob.size>limitKB*1024 && q>0.2){q-=0.1;blob=await compressImage(file,800,q);}
  return blob;
}

function blobToBase64(blob){
  return new Promise(r=>{const fr=new FileReader();fr.onload=()=>r(fr.result);fr.readAsDataURL(blob);});
}

input.onchange = async ()=>{
  const files=[...input.files];
  if(files.length!==TOTAL){alert('Debes seleccionar exactamente 25 fotos');input.value='';return;}
  progreso.textContent='Comprimiendo fotos...';
  btnCreate.disabled=true;
  const blobs=await Promise.all(files.map(f=>compressTo(f)));
  const urls=blobs.map(b=>URL.createObjectURL(b));
  letters.forEach((el,i)=>{el.style.backgroundImage=`url(${urls[i]})`;el.classList.add('filled');});
  slots.forEach((el,i)=>{el.style.backgroundImage=`url(${urls[i+5]})`;});
  window._blobs=blobs;
  progreso.textContent='Listas. Pulsa "Enviar fotos".';
  btnCreate.disabled=false;
};

btnCreate.onclick = async ()=>{
  if(!window._blobs||window._blobs.length!==TOTAL){alert('Primero agrega las 25 fotos');return;}
  btnCreate.disabled=true;
  barraWrap.style.display='block';
  const imgs=[];
  for(let i=0;i<window._blobs.length;i++){
    imgs.push(await blobToBase64(window._blobs[i]));
    const pct=Math.round((i+1)/TOTAL*100);
    barraFill.style.width=pct+'%';
    progreso.textContent=`Preparando (${i+1}/${TOTAL})...`;
  }
  try{
    const numChunks=Math.ceil(imgs.length/CHUNK_SIZE);
    for(let c=0;c<numChunks;c++){
      progreso.textContent=`Subiendo parte ${c+1} de ${numChunks}...`;
      await setDoc(doc(db,'corazon',`chunk_${c}`),{
        imgs:imgs.slice(c*CHUNK_SIZE,(c+1)*CHUNK_SIZE),
        updatedAt:Date.now()
      });
    }
    await setDoc(META_DOC,{ready:true,chunks:numChunks,updatedAt:Date.now()});
    progreso.textContent='Listo! Ya puede ver el corazon.';
  }catch(e){
    progreso.textContent='Error: '+e.message;
    console.error(e);
    btnCreate.disabled=false;
  }
};

async function cargarImagenes(){
  const meta=(await getDoc(META_DOC)).data();
  const allImgs=[];
  for(let c=0;c<meta.chunks;c++){
    const snap=await getDoc(doc(db,'corazon',`chunk_${c}`));
    allImgs.push(...snap.data().imgs);
  }
  return allImgs;
}

async function renderResultado(){
  const allImgs=await cargarImagenes();

  // Letras: T=imgs[0] E=imgs[1] espacio=sin foto A=imgs[2] M=imgs[3] O=imgs[4]
  const rLetters=[...document.querySelectorAll('.res-letter')];
  const letterMap=[allImgs[0],allImgs[1],null,allImgs[2],allImgs[3],allImgs[4]];
  rLetters.forEach((el,i)=>{if(letterMap[i])el.style.backgroundImage=`url('${letterMap[i]}')`;});

  const heart=$('res-heart');
  heart.innerHTML='';
  allImgs.slice(5).forEach((img,i)=>{
    const d=document.createElement('div');
    d.className='res-slot';
    const l=LAYOUT[i];
    d.style.cssText=`left:${l.left};top:${l.top};width:${l.width};height:${l.height};background-image:url('${img}')`;
    heart.appendChild(d);
  });

  vistaYo.classList.remove('active');
  vistaSubida.classList.remove('active');
  modeSelector.style.display='none';
  vistaRes.classList.add('active');

  setTimeout(()=>{
    const els=[...document.querySelectorAll('.res-letter,.res-slot')];
    els.sort(()=>Math.random()-.5);
    els.forEach((el,i)=>setTimeout(()=>el.classList.add('show'),120*i));
  },100);

  iniciarFuegos();
}

function iniciarFuegos(){
  const canvas=$('fireworks');
  const ctx=canvas.getContext('2d');
  let w,h;
  const resize=()=>{w=canvas.width=window.innerWidth;h=canvas.height=window.innerHeight;};
  window.addEventListener('resize',resize);resize();
  const fws=[];
  const colors=['#ff4d6d','#ff8fa3','#ffb3c1','#ff0040','#fff'];
  class FW{
    constructor(){
      this.x=Math.random()*w;this.y=h;
      this.ty=Math.random()*h*.45+h*.1;
      this.color=colors[Math.floor(Math.random()*colors.length)];
      this.speed=Math.random()*2+2;this.exploded=false;this.particles=[];
    }
    update(){
      if(!this.exploded){
        this.y-=this.speed;
        if(this.y<=this.ty){
          this.exploded=true;
          for(let i=0;i<40;i++)
            this.particles.push({x:this.x,y:this.y,vx:(Math.random()-.5)*9,vy:(Math.random()-.5)*9,life:Math.random()*80+80});
        }
      }
    }
    draw(){
      if(!this.exploded){ctx.fillStyle=this.color;ctx.fillRect(this.x,this.y,2,2);}
      else this.particles.forEach(p=>{ctx.fillStyle=this.color;ctx.fillRect(p.x,p.y,2,2);});
    }
  }
  for(let i=0;i<6;i++)fws.push(new FW());
  (function loop(){
    ctx.clearRect(0,0,w,h);
    if(Math.random()<.05)fws.push(new FW());
    for(let i=fws.length-1;i>=0;i--){
      fws[i].update();
      if(fws[i].exploded){
        fws[i].particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.03;p.life--;});
        fws[i].particles=fws[i].particles.filter(p=>p.life>0);
        if(!fws[i].particles.length){fws.splice(i,1);continue;}
      }
      fws[i].draw();
    }
    requestAnimationFrame(loop);
  })();
}

async function init(){
  try{
    const snap=await getDoc(META_DOC);
    if(snap.exists()&&snap.data().ready){
      loadingScreen.classList.add('hidden');
      await renderResultado();
      return;
    }
  }catch(e){console.warn('Firestore check failed',e);}

  loadingScreen.classList.add('hidden');
  modeSelector.style.display='flex';

  $('btn-ella').onclick=()=>{modeSelector.style.display='none';vistaSubida.classList.add('active');};
  $('btn-yo').onclick=()=>{
    modeSelector.style.display='none';
    vistaYo.classList.add('active');
    onSnapshot(META_DOC,async snap=>{
      if(snap.exists()&&snap.data().ready) await renderResultado();
    });
  };
}

init();
</script>
</body>
</html>
